[theme]
# Base theme for the Erebus skin (eon/ui/skin). The skin re-skins every widget
# via CSS and exposes an in-app dark/light toggle; these values set the initial
# navy paint so there is no light flash before the skin loads. Dark is default.
base = "dark"
primaryColor = "#5b8def"
backgroundColor = "#14171f"
secondaryBackgroundColor = "#1c2130"
textColor = "#f4f5fa"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
